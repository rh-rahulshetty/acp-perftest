# LocustTest CR template for session-crud scenario.
# Variables are substituted by ci-scripts/load-test.sh via envsubst.
apiVersion: locust.io/v2
kind: LocustTest
metadata:
  name: ${LOCUST_TEST_NAME}
  namespace: ${LOCUST_NAMESPACE}
spec:
  image: locustio/locust:2.43.3
  testFiles:
    configMapRef: ${CONFIGMAP_NAME}
  master:
    env:
      - name: PROJECT_NAME
        value: "${PROJECT_NAME}"
      - name: AUTH_TOKEN
        value: "${AUTH_TOKEN}"
    command: >-
      --locustfile /lotest/src/session_crud.py
      --host ${LOCUST_HOST}
      --users ${TEST_USERS}
      --spawn-rate ${TEST_SPAWN_RATE}
      --run-time ${TEST_RUN_TIME}
      --csv /tmp/locust-results
      --headless
  worker:
    env:
      - name: PROJECT_NAME
        value: "${PROJECT_NAME}"
      - name: AUTH_TOKEN
        value: "${AUTH_TOKEN}"
    command: "--locustfile /lotest/src/session_crud.py"
    replicas: ${TEST_WORKERS}
