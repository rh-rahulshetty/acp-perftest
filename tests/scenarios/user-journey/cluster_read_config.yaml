# cluster_read_config.yaml — Scenario-specific OPL metrics for user-journey.
#
# Project-scoped ambient_* metrics use exported_namespace to filter by the
# project namespace (PROJECT_NAME). The scrape-injected "namespace" label is
# always "ambient-code"; the OTel-emitted project namespace lands in
# "exported_namespace".

# --- 01 POST /agentic-sessions (create) ---
- name: results.01_POST_agentic-sessions_create.locust_requests_avg_response_time
  monitoring_query: sum(locust_requests_avg_response_time{name="01 POST /agentic-sessions (create)"})
  monitoring_step: 15
- name: results.01_POST_agentic-sessions_create.locust_requests_current_rps
  monitoring_query: sum(locust_requests_current_rps{name="01 POST /agentic-sessions (create)"})
  monitoring_step: 15
- name: results.01_POST_agentic-sessions_create.locust_requests_current_fail_per_sec
  monitoring_query: sum(locust_requests_current_fail_per_sec{name="01 POST /agentic-sessions (create)"})
  monitoring_step: 15
- name: results.01_POST_agentic-sessions_create.locust_requests_num_requests
  monitoring_query: sum(locust_requests_num_requests{name="01 POST /agentic-sessions (create)"})
  monitoring_step: 15
- name: results.01_POST_agentic-sessions_create.locust_requests_num_failures
  monitoring_query: sum(locust_requests_num_failures{name="01 POST /agentic-sessions (create)"})
  monitoring_step: 15
- name: results.01_POST_agentic-sessions_create.locust_requests_avg_content_length
  monitoring_query: sum(locust_requests_avg_content_length{name="01 POST /agentic-sessions (create)"})
  monitoring_step: 15

