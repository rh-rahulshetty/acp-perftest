# ServiceMonitor for OpenShift user-workload monitoring.
# Matches all services in the namespace; scrapes the exporter sidecar (port 9646)
# and operator metrics (port 8080).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: locust-monitor
  namespace: ${LOCUST_NAMESPACE}
  labels:
    app: locust-operator
    openshift.io/cluster-monitoring: "true"
spec:
  endpoints:
    - interval: 10s
      port: prometheus-metrics
      honorLabels: true
    - interval: 30s
      port: metrics
      honorLabels: true
  namespaceSelector:
    matchNames:
      - ${LOCUST_NAMESPACE}
  selector: {}
