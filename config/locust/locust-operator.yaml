# Helm values for locust-k8s-operator (OpenShift compatible)
# Ref: https://github.com/AbdelrhmanHamouda/locust-k8s-operator

image:
  repository: mirror.gcr.io/lotest/locust-k8s-operator

# OpenShift SCC: let the platform assign UIDs/GIDs
podSecurityContext:
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  fsGroup: null
  seccompProfile:
    type: RuntimeDefault

replicaCount: 1

leaderElection:
  enabled: false

podDisruptionBudget:
  enabled: false

metrics:
  enabled: true
  port: 8080
  secure: false

locustPods:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
      ephemeralStorage: 50M
    limits:
      cpu: 1000m
      memory: 1Gi
      ephemeralStorage: 100M
  metricsExporter:
    image: mirror.gcr.io/containersol/locust_exporter:v0.5.0
    port: 9646
    pullPolicy: IfNotPresent

otelCollector:
  enabled: false

k8s:
  clusterRole:
    enabled: true
