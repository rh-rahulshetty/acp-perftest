# cluster_read_config.yaml — OPL configuration for collecting cluster metrics.
#
# Used by ci-scripts/collect-results.sh via `opl.status_data`.
# Queries Prometheus/Thanos for key metrics during the load test window.
#
# Naming convention:
#   measurements.<component>.<metric>    — time-series monitoring data
#   results.<endpoint>.<metric>          — locust per-endpoint results
#   metadata.<category>.<key>            — cluster/env metadata
#
# Scenarios can provide their own cluster_read_config.yaml to add
# scenario-specific metrics (e.g. additional endpoints).

# ============================================================================
# Cluster-level resource metrics
# ============================================================================

- name: measurements.cluster.cpu_usage_rate
  monitoring_query: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{cluster=""})
  monitoring_step: 15

- name: measurements.cluster.workers_avg_cpu_pct
  monitoring_query: |
    sum(rate(node_cpu_seconds_total{mode!="idle"}[5m])
      * on(instance) group_left(role)
        label_replace(kube_node_role{role="worker"}, "instance", "$1", "node", "(.+)"))
    / count(node_cpu_seconds_total{mode="idle"}
      * on(instance) group_left(role)
        label_replace(kube_node_role{role="worker"}, "instance", "$1", "node", "(.+)"))
    * 100
  monitoring_step: 15

- name: measurements.cluster.memory_rss_total
  monitoring_query: sum(container_memory_rss{job="kubelet", metrics_path="/metrics/cadvisor", cluster="", container!=""})
  monitoring_step: 15

- name: measurements.cluster.pod_count
  monitoring_query: count(kube_pod_info)
  monitoring_step: 15

- name: measurements.cluster.running_pods_on_workers
  monitoring_query: >-
    count(kube_pod_info
      * on(node) group_left(role) kube_node_role{role="worker"}
      and on(pod, namespace)
        (kube_pod_status_phase{job="kube-state-metrics", phase="Running"} > 0))
  monitoring_step: 15

- name: measurements.cluster.worker_node_count
  monitoring_query: count(kube_node_role{role="worker"})
  monitoring_step: 15

- name: measurements.cluster.scheduler_pending_pods
  monitoring_query: sum(scheduler_pending_pods)
  monitoring_step: 15

- name: measurements.cluster.network_bytes_total
  monitoring_query: >-
    sum(irate(container_network_receive_bytes_total{cluster="",namespace=~".*"}[5m]))
    + sum(irate(container_network_transmit_bytes_total{cluster="",namespace=~".*"}[5m]))
  monitoring_step: 15

- name: measurements.cluster.disk_throughput_total
  monitoring_query: >-
    sum(rate(container_fs_reads_bytes_total{id!="", device=~"(/dev.+)|mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|dasd.+", cluster=""}[5m])
    + rate(container_fs_writes_bytes_total{id!="", device=~"(/dev.+)|mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|dasd.+", cluster=""}[5m]))
  monitoring_step: 15


# ============================================================================
# API server and etcd
# ============================================================================

- name: measurements.apiserver.request_total_rate
  monitoring_query: sum(rate(apiserver_request_total[5m]))
  monitoring_step: 15

- name: measurements.etcd.request_duration_avg
  monitoring_query: sum(rate(etcd_request_duration_seconds_sum[5m])) / sum(rate(etcd_request_duration_seconds_count[5m]))
  monitoring_step: 15

- name: measurements.etcd.db_total_size_bytes
  monitoring_query: avg(etcd_mvcc_db_total_size_in_bytes)
  monitoring_step: 15

- name: measurements.etcd.db_in_use_bytes
  monitoring_query: avg(etcd_mvcc_db_total_size_in_use_in_bytes)
  monitoring_step: 15


# ============================================================================
# Ambient Code Platform (ACP) pod-level metrics — ambient-code namespace
# ============================================================================

# --- backend-api ---
- name: measurements.ambient.backend-api.cpu
  monitoring_query: sum(pod:container_cpu_usage:sum{namespace='ambient-code', pod=~'backend-api.*'})
  monitoring_step: 15
- name: measurements.ambient.backend-api.memory
  monitoring_query: sum(container_memory_usage_bytes{namespace='ambient-code', pod=~'backend-api.*', container!='POD', container!=''})
  monitoring_step: 15
- name: measurements.ambient.backend-api.network_throughput
  monitoring_query: >-
    sum(rate(container_network_transmit_bytes_total{namespace='ambient-code', pod=~'backend-api.*'}[60s])
    + rate(container_network_receive_bytes_total{namespace='ambient-code', pod=~'backend-api.*'}[60s]))
  monitoring_step: 60
- name: measurements.ambient.backend-api.restarts
  monitoring_query: sum(kube_pod_container_status_restarts_total{namespace='ambient-code', pod=~'backend-api.*'})
  monitoring_step: 15

