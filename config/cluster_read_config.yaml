# ============================================================================
# Locust infrastructure metrics (locust-operator namespace pods)
# ============================================================================

- name: measurements.locust.master.cpu
  monitoring_query: sum(pod:container_cpu_usage:sum{namespace='locust-operator', pod=~'.*master.*'})
  monitoring_step: 15
- name: measurements.locust.master.memory
  monitoring_query: sum(container_memory_usage_bytes{namespace='locust-operator', pod=~'.*master.*', container!='POD', container!=''})
  monitoring_step: 15
- name: measurements.locust.workers.cpu
  monitoring_query: sum(pod:container_cpu_usage:sum{namespace='locust-operator', pod=~'.*worker.*'})
  monitoring_step: 15
- name: measurements.locust.workers.memory
  monitoring_query: sum(container_memory_usage_bytes{namespace='locust-operator', pod=~'.*worker.*', container!='POD', container!=''})
  monitoring_step: 15


# ============================================================================
# Cluster metadata (collected via shell commands)
# ============================================================================

- name: metadata.cluster.context
  command: oc project default > /dev/null 2>&1; oc config current-context

- name: metadata.cluster.control-plane.count
  command: oc get nodes -l node-role.kubernetes.io/master -o name 2>/dev/null | wc -l

- name: metadata.cluster.control-plane.flavor
  command: >-
    oc get nodes -l node-role.kubernetes.io/master -o json
    | jq --raw-output '.items | map(.metadata.labels."beta.kubernetes.io/instance-type") | unique | sort | join(",")'

- name: metadata.cluster.compute-nodes.count
  command: oc get nodes -l node-role.kubernetes.io/worker -o name 2>/dev/null | wc -l

- name: metadata.cluster.compute-nodes.flavor
  command: >-
    oc get nodes -l node-role.kubernetes.io/worker -o json
    | jq --raw-output '.items | map(.metadata.labels."beta.kubernetes.io/instance-type") | unique | sort | join(",")'
